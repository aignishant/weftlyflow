site_name: Weftlyflow
site_description: Self-hosted workflow automation platform — Python backend, Vue 3 frontend, visual node-graph editor, triggers, AI agents.
site_author: Weftlyflow contributors
site_url: https://aignishant.github.io/weftlyflow/
repo_url: https://github.com/aignishant/weftlyflow
repo_name: aignishant/weftlyflow
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
copyright: Copyright &copy; 2026 Weftlyflow contributors

theme:
  name: material
  language: en
  features:
    - announce.dismiss
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.prune
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view
    - header.autohide
  palette:
    - media: "(prefers-color-scheme)"
      toggle: { icon: material/brightness-auto, name: Switch to light mode }
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle: { icon: material/weather-sunny, name: Switch to system preference }
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/graph-outline
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_signature_annotations: true
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_bases: true
            show_if_no_docstring: false
            members_order: source
            filters: ["!^_"]
            heading_level: 2
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      title: On this page
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: aignishant
      repo: weftlyflow
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds: { case: lower }
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Source walkthrough:
      - walkthrough/index.md
      - How to read this project: walkthrough/onboarding.md
      - Repository tour: walkthrough/repo-tour.md
      - Backend:
          - walkthrough/backend/index.md
          - Domain → Engine → Nodes: walkthrough/backend/domain-engine-nodes.md
          - Server & Database: walkthrough/backend/server-db.md
          - Triggers, Worker, Webhooks: walkthrough/backend/triggers-worker-webhooks.md
          - Auth, Credentials, Expression: walkthrough/backend/auth-credentials-expression.md
          - Cross-cutting modules: walkthrough/backend/cross-cutting.md
      - Frontend (Vue 3): walkthrough/frontend.md
      - Data-flow tracer: walkthrough/data-flow.md
      - Source backtracking: walkthrough/source-backtrack.md
  - Getting started:
      - getting-started/install.md
      - getting-started/first-workflow.md
      - getting-started/concepts.md
  - Guide:
      - guide/ui-walkthrough.md
      - guide/workflows.md
      - guide/triggers-and-schedules.md
      - guide/expressions.md
      - guide/code-node.md
      - guide/credentials.md
      - guide/external-secrets.md
      - guide/single-sign-on.md
      - guide/ai-and-agents.md
      - guide/multi-tenancy.md
      - guide/webhooks.md
      - guide/execution-data-storage.md
      - guide/self-hosting.md
  - Built-in nodes:
      - nodes/index.md
  - API reference: reference/
  - Contributing:
      - contributing/node-plugins.md
      - contributing/tier-3-integrations.md
      - contributing/credential-plugins.md
      - contributing/coding-standards.md
      - contributing/security-testing.md
      - contributing/load-testing.md
      - contributing/ip-compliance.md
  - Changelog: changelog.md

extra:
  generator: false
  status:
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aignishant/weftlyflow
      name: Weftlyflow on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/weftlyflow/
      name: Weftlyflow on PyPI
