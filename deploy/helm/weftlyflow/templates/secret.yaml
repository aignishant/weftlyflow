{{/*
secret.yaml — Sensitive WEFTLYFLOW_* environment variables.

Rendered only when existingSecret is empty. When existingSecret is set the
operator is responsible for ensuring that Secret exists with the correct keys
before helm install/upgrade runs.

Keys written:
  WEFTLYFLOW_JWT_SECRET_KEY
  WEFTLYFLOW_ENCRYPTION_KEY
  WEFTLYFLOW_DATABASE_URL
  WEFTLYFLOW_REDIS_URL
  WEFTLYFLOW_CELERY_BROKER_URL
  WEFTLYFLOW_CELERY_RESULT_BACKEND
*/}}
{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "weftlyflow.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weftlyflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  WEFTLYFLOW_JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | required "secrets.jwtSecretKey must be set" | quote }}
  WEFTLYFLOW_ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  WEFTLYFLOW_DATABASE_URL: {{ include "weftlyflow.databaseUrl" . | quote }}
  WEFTLYFLOW_REDIS_URL: {{ include "weftlyflow.resolvedRedisUrl" . | quote }}
  WEFTLYFLOW_CELERY_BROKER_URL: {{ include "weftlyflow.celeryBrokerUrl" . | quote }}
  WEFTLYFLOW_CELERY_RESULT_BACKEND: {{ include "weftlyflow.celeryResultBackend" . | quote }}
{{- end }}
