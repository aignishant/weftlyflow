{{/*
hpa.yaml — Horizontal Pod Autoscalers for api and worker.

Both are disabled by default. Beat must NEVER be autoscaled (singleton
constraint, IMPLEMENTATION_BIBLE §13.3). When enabling, ensure
metrics-server is installed in the cluster.
*/}}
{{- if .Values.hpa.api.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "weftlyflow.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weftlyflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "weftlyflow.fullname" . }}-api
  minReplicas: {{ .Values.hpa.api.minReplicas }}
  maxReplicas: {{ .Values.hpa.api.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.api.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.api.targetMemoryUtilizationPercentage }}
{{- end }}
{{- if .Values.hpa.worker.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "weftlyflow.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weftlyflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "weftlyflow.fullname" . }}-worker
  minReplicas: {{ .Values.hpa.worker.minReplicas }}
  maxReplicas: {{ .Values.hpa.worker.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.worker.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.worker.targetMemoryUtilizationPercentage }}
{{- end }}
